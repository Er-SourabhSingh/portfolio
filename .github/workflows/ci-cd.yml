name: CI/CD — Portfolio

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────
  # CI — Check that index.html exists and is not empty
  # ─────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "index.html not found"
            exit 1
          fi
          echo "index.html found"

      - name: Check index.html is not empty
        run: |
          if [ ! -s "index.html" ]; then
            echo "index.html is empty"
            exit 1
          fi
          echo "index.html has content ($(wc -c < index.html) bytes)"

  # ─────────────────────────────────────────────────────────
  # CD — Deploy to GitHub Pages (only on push to master)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
